# Конфигурация Streamlit для UI агента (ui/app.py).

[server]
# Авто-перезапуск при сохранении app.py: иначе с toolbarMode="minimal" плашка
# «Source file changed → Rerun» спрятана, и правки не применяются без рестарта.
runOnSave = true

[client]
# Прячем верхнюю панель «Deploy» и гамбургер-меню — чище для демо/сдачи.
toolbarMode = "minimal"

[theme]
# Палитра референса «Чат редизайн»: эмеральд-зелёный на мятном фоне, шрифт Manrope.
primaryColor = "#0F9650"
backgroundColor = "#EDF3EF"
secondaryBackgroundColor = "#EDF3EF"
textColor = "#16241C"
font = "sans serif"
