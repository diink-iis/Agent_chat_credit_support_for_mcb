<style>
:root{
  --bg-app:#f4f7f4;
  --surface:#ffffff;
  --sidebar:#fbfcfb;
  --border:rgba(16,42,28,.085);
  --border-strong:rgba(16,42,28,.14);
  --text:#15201a;
  --text-2:#586259;
  --text-3:#8b958d;
  --shadow-sm:0 1px 2px rgba(16,42,28,.05);
  --shadow-md:0 4px 16px rgba(16,42,28,.07);
  --shadow-lg:0 18px 48px rgba(16,42,28,.12);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg-app);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
::selection{background:color-mix(in srgb,var(--accent) 22%,#fff)}

.app{
  display:flex;height:100vh;width:100vw;overflow:hidden;
  --accent:#0F9650;--radius:12px;--gap:1;
  --accent-dark:color-mix(in srgb,var(--accent) 80%,#0a3a23);
  --accent-tint:color-mix(in srgb,var(--accent) 8%,#fff);
  --accent-tint-2:color-mix(in srgb,var(--accent) 15%,#fff);
  --accent-line:color-mix(in srgb,var(--accent) 26%,#fff);
  font-size:15px;line-height:1.5;letter-spacing:-.005em;
}
.app[data-density="compact"]{--gap:.78}
.app[data-density="comfy"]{--gap:1.22}

/* ─── Sidebar ─────────────────────────────────────────── */
.sb{
  width:266px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:14px 12px;gap:14px;
}
.sb__brand{display:flex;align-items:center;gap:10px;padding:6px 6px 2px}
.sb__logo{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--accent),var(--accent-dark));
  box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 38%,transparent);
}
.sb__brandtext{display:flex;flex-direction:column;min-width:0;line-height:1.2}
.sb__brandname{font-weight:650;font-size:14.5px;letter-spacing:-.01em}
.sb__brandsub{font-size:11.5px;color:var(--text-3)}
.sb__brandchev{margin-left:auto;color:var(--text-3)}

.sb__search{
  display:flex;align-items:center;gap:8px;padding:0 10px;height:38px;
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);color:var(--text-3);
}
.sb__search input{flex:1;border:0;outline:0;background:none;font-size:13.5px;color:var(--text)}
.sb__search input::placeholder{color:var(--text-3)}
.sb__search kbd{
  font-size:11px;color:var(--text-3);border:1px solid var(--border);border-radius:5px;
  padding:1px 6px;background:#fafbfa;font-family:inherit;
}

.sb__nav{display:flex;flex-direction:column;gap:2px}
.sb__item{
  display:flex;align-items:center;gap:11px;width:100%;border:0;background:none;
  padding:calc(9px * var(--gap)) 11px;border-radius:10px;color:var(--text-2);
  font-size:13.7px;font-weight:500;text-align:left;transition:background .14s,color .14s;
}
.sb__item:hover{background:color-mix(in srgb,var(--text) 4%,transparent);color:var(--text)}
.sb__item.is-active{background:var(--accent-tint);color:var(--accent-dark);font-weight:600}
.sb__item.is-active svg{color:var(--accent)}
.sb__item svg{flex-shrink:0;color:var(--text-3)}
.sb__item.is-active svg{color:var(--accent)}
.sb__label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb__badge{
  font-size:11px;font-weight:600;min-width:18px;height:18px;padding:0 5px;border-radius:9px;
  display:grid;place-items:center;background:var(--accent);color:#fff;
}

.sb__spacer{flex:1}

.sb__promo{
  border:1px solid var(--border);border-radius:14px;padding:14px;
  background:linear-gradient(160deg,var(--accent-tint),#fff 70%);
}
.sb__promo-icon{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;
  background:linear-gradient(150deg,var(--accent),var(--accent-dark));margin-bottom:9px;
}
.sb__promo-title{font-weight:650;font-size:13px}
.sb__promo-text{font-size:11.8px;color:var(--text-2);margin:3px 0 11px;line-height:1.4}
.sb__promo-btn{
  width:100%;border:0;background:var(--accent);color:#fff;font-weight:600;font-size:12.5px;
  padding:9px;border-radius:9px;transition:background .14s;
}
.sb__promo-btn:hover{background:var(--accent-dark)}

.sb__foot{display:flex;flex-direction:column;gap:2px;padding-top:4px}
.sb__footitem{
  display:flex;align-items:center;gap:11px;border:0;background:none;color:var(--text-2);
  padding:8px 11px;border-radius:10px;font-size:13.3px;font-weight:500;text-align:left;
}
.sb__footitem svg{color:var(--text-3)}
.sb__footitem:hover{background:color-mix(in srgb,var(--text) 4%,transparent);color:var(--text)}
.sb__user{
  display:flex;align-items:center;gap:10px;padding:8px 8px;margin-top:4px;border-radius:10px;
}
.sb__user:hover{background:color-mix(in srgb,var(--text) 4%,transparent)}
.sb__avatar{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;
  font-size:12px;font-weight:650;color:var(--accent-dark);background:var(--accent-tint-2);
}
.sb__userinfo{display:flex;flex-direction:column;min-width:0;line-height:1.25}
.sb__username{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb__userrole{font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb__logout{margin-left:auto;color:var(--text-3);flex-shrink:0}

/* ─── Main / top bar ──────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-app)}
.topbar{
  height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--surface) 70%,transparent);
  backdrop-filter:blur(8px);
}
.topbar__left{display:flex;align-items:center;gap:14px}
.model{
  display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:#fff;white-space:nowrap;
  padding:7px 11px;border-radius:10px;font-size:13px;font-weight:600;color:var(--text);box-shadow:var(--shadow-sm);
}
.model:hover{border-color:var(--border-strong)}
.model__dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-tint-2)}
.model svg{color:var(--text-3)}
.topbar__crumb{font-size:13px;color:var(--text-3);font-weight:500}
.topbar__right{display:flex;align-items:center;gap:10px}
.topbar__search{
  display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:#fff;white-space:nowrap;
  padding:8px 13px;border-radius:10px;font-size:13px;color:var(--text-2);font-weight:500;
}
.topbar__search:hover{border-color:var(--border-strong);color:var(--text)}
.topbar__new{
  display:flex;align-items:center;gap:7px;border:0;background:var(--accent);color:#fff;white-space:nowrap;
  padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 30%,transparent);
  transition:background .14s,transform .1s;
}
.topbar__new:hover{background:var(--accent-dark)}
.topbar__new:active{transform:translateY(1px)}
.main__body{flex:1;min-height:0;display:flex;overflow:hidden}

/* ─── Orb ─────────────────────────────────────────────── */
.orb{position:relative;display:grid;place-items:center;flex-shrink:0;animation:orbfloat 6.5s ease-in-out infinite}
.orb__glow{position:absolute;inset:-22%;border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--accent) 45%,transparent),transparent 62%);
  filter:blur(16px);animation:orbpulse 4.2s ease-in-out infinite}
.orb__ball{position:relative;width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 33% 27%,#EEFAD2 0%,#D8F1A0 13%,#BFE696 28%,#A6DB8C 44%,#74C478 64%,var(--accent) 100%);
  box-shadow:inset 0 -9px 20px rgba(13,80,48,.42),inset 0 7px 13px rgba(255,255,255,.55),0 10px 28px color-mix(in srgb,var(--accent) 28%,transparent)}
.orb__hi{position:absolute;top:15%;left:21%;width:30%;height:23%;border-radius:50%;
  background:radial-gradient(circle at 42% 42%,rgba(255,255,255,.95),transparent 70%);filter:blur(2px)}
@keyframes orbpulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.95;transform:scale(1.07)}}
@keyframes orbfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@media (prefers-reduced-motion:reduce){.orb,.orb__glow{animation:none}}

/* ─── Welcome ─────────────────────────────────────────── */
.welcome{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:40px 28px}
.welcome--a .welcome__inner,.welcome--b .welcome__inner{
  width:100%;max-width:720px;display:flex;flex-direction:column;align-items:center;
  margin:auto 0;
}
.welcome--a .welcome__inner{gap:calc(22px * var(--gap))}
.welcome--b .welcome__inner{gap:calc(16px * var(--gap))}
.welcome__title{margin:0;text-align:center;font-weight:700;letter-spacing:-.025em;line-height:1.12}
.welcome__title--big{font-size:clamp(28px,3.4vw,42px)}
.welcome__title--big span{
  background:linear-gradient(95deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#74C478));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.welcome--b .welcome__title{font-size:clamp(24px,2.8vw,32px)}
.welcome__sub{margin:0;text-align:center;color:var(--text-2);font-size:15px;max-width:480px;text-wrap:pretty}
.welcome__hint{font-size:11.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);align-self:flex-start;margin-top:4px}

.modelcard{
  width:100%;display:flex;align-items:center;gap:13px;text-align:left;
  border:1px solid var(--border);background:#fff;border-radius:var(--radius);
  padding:13px 15px;box-shadow:var(--shadow-sm);transition:border-color .14s,box-shadow .14s;
}
.modelcard:hover{border-color:var(--accent-line);box-shadow:var(--shadow-md)}
.modelcard__ic{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;
  color:#fff;background:linear-gradient(150deg,var(--accent),var(--accent-dark))}
.modelcard__txt{display:flex;flex-direction:column;gap:2px;min-width:0}
.modelcard__txt strong{font-size:13.5px;font-weight:600}
.modelcard__txt small{font-size:12px;color:var(--text-2)}
.modelcard__chev{margin-left:auto;color:var(--text-3);flex-shrink:0}

/* ─── Composer ────────────────────────────────────────── */
.composer{width:100%;background:#fff;border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);
  box-shadow:var(--shadow-md);transition:border-color .15s,box-shadow .15s}
.composer:focus-within{border-color:var(--accent-line);box-shadow:0 6px 22px color-mix(in srgb,var(--accent) 14%,transparent)}
.composer--hero{padding:6px 6px}
.composer__top{display:flex;align-items:flex-start;gap:10px;padding:12px 14px 4px}
.composer__spark{color:var(--accent);margin-top:3px;flex-shrink:0}
.composer__top textarea{flex:1;border:0;outline:0;resize:none;background:none;font-size:15px;
  line-height:1.5;color:var(--text);padding:1px 0;max-height:160px}
.composer__top textarea::placeholder{color:var(--text-3)}
.composer__bar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 10px;gap:8px}
.composer__left,.composer__right{display:flex;align-items:center;gap:7px}
.composer__tool{display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:#fff;
  color:var(--text-2);font-size:12.5px;font-weight:500;padding:6px 10px;border-radius:9px;transition:.14s}
.composer__tool:hover{border-color:var(--border-strong);color:var(--text);background:#fafbfa}
.composer__tool--icon{padding:6px}
.composer__tool--style{color:var(--text-2)}
.composer__tool--style svg{color:var(--text-3)}
.composer__cite{display:flex;align-items:center;gap:7px;border:0;background:none;color:var(--text-3);
  font-size:12.5px;font-weight:500;padding:5px 4px}
.composer__cite.is-on{color:var(--accent-dark)}
.composer__switch{width:30px;height:18px;border-radius:9px;background:var(--border-strong);position:relative;transition:background .15s}
.composer__switch i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;
  box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
.composer__cite.is-on .composer__switch{background:var(--accent)}
.composer__cite.is-on .composer__switch i{transform:translateX(12px)}
.composer__send{width:36px;height:36px;border-radius:10px;border:0;background:var(--accent);color:#fff;
  display:grid;place-items:center;flex-shrink:0;box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 32%,transparent);transition:background .14s,transform .1s}
.composer__send:hover{background:var(--accent-dark)}
.composer__send:active{transform:scale(.94)}

/* ─── Cards ───────────────────────────────────────────── */
.cards{width:100%;display:grid;gap:11px}
.cards--a{grid-template-columns:repeat(2,1fr)}
.cards--b{grid-template-columns:repeat(3,1fr)}
.card{display:flex;text-align:left;border:1px solid var(--border);background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow-sm);transition:border-color .14s,box-shadow .14s,transform .12s}
.card:hover{border-color:var(--accent-line);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card__ic{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;
  color:var(--accent);background:var(--accent-tint)}
.card--a{gap:13px;padding:14px;align-items:flex-start}
.card--a .card__body{display:flex;flex-direction:column;gap:3px;min-width:0}
.cards--b .card{flex-direction:column;gap:9px;padding:15px;align-items:flex-start}
.card__title{font-size:13.8px;font-weight:600;line-height:1.3;text-wrap:pretty}
.card__sub{font-size:12.3px;color:var(--text-2);line-height:1.4;text-wrap:pretty}
.refresh{display:flex;align-items:center;gap:7px;border:0;background:none;color:var(--text-3);
  font-size:12.5px;font-weight:500;padding:4px}
.refresh:hover{color:var(--accent-dark)}
.refresh svg{color:var(--text-3)}

/* ─── Chat ────────────────────────────────────────────── */
.chat{flex:1;display:flex;flex-direction:column;min-height:0}
.chat__scroll{flex:1;overflow-y:auto;scroll-behavior:smooth}
.chat__thread{max-width:760px;margin:0 auto;padding:28px 28px 16px;display:flex;flex-direction:column;gap:24px}
.msg{display:flex;animation:msgin .35s cubic-bezier(.2,.8,.3,1)}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg--user{justify-content:flex-end}
.msg__bubble{max-width:78%;background:var(--accent-tint);color:var(--accent-dark);
  border:1px solid color-mix(in srgb,var(--accent) 16%,#fff);
  padding:11px 15px;border-radius:var(--radius);border-bottom-right-radius:5px;
  font-size:14.5px;line-height:1.5;text-wrap:pretty}
.msg--ai{gap:13px}
.msg__avatar{flex-shrink:0;margin-top:2px}
.msg__ai{min-width:0;flex:1}
.msg__name{font-size:12.5px;font-weight:650;color:var(--text);margin-bottom:7px}
.ai__blocks{display:flex;flex-direction:column;gap:13px}
.ai__p{margin:0;font-size:14.5px;line-height:1.6;color:var(--text);text-wrap:pretty}
.ai__note{display:flex;gap:9px;align-items:flex-start;background:var(--accent-tint);
  border:1px solid color-mix(in srgb,var(--accent) 14%,#fff);border-radius:var(--radius);
  padding:11px 13px;font-size:13.5px;line-height:1.5;color:var(--accent-dark)}
.ai__note svg{flex-shrink:0;margin-top:1px;color:var(--accent)}
.ai__list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
.ai__list li{display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.45;color:var(--text)}
.ai__check{flex-shrink:0;width:19px;height:19px;border-radius:6px;display:grid;place-items:center;margin-top:1px;
  background:var(--accent);color:#fff}
.ai__list li:not(.is-done) .ai__check{background:transparent;border:1.6px solid var(--border-strong)}
.ai__list li:not(.is-done) .ai__check i{width:0;height:0}
.ai__list li:not(.is-done){color:var(--text-2)}

.ai__stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ai__stat{border:1px solid var(--border);border-radius:var(--radius);padding:12px 13px;background:#fff;
  display:flex;flex-direction:column;gap:4px}
.ai__stat-k{font-size:11.5px;color:var(--text-3);font-weight:500}
.ai__stat-v{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--accent-dark)}

.ai__score{display:flex;align-items:center;gap:16px;border:1px solid var(--border);border-radius:var(--radius);
  padding:15px 17px;background:linear-gradient(120deg,var(--accent-tint),#fff 65%)}
.ai__score-ring{--p:0;position:relative;width:64px;height:64px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),color-mix(in srgb,var(--accent) 16%,#fff) 0)}
.ai__score-ring::after{content:"";position:absolute;width:50px;height:50px;border-radius:50%;background:#fff}
.ai__score-ring span{position:relative;font-size:19px;font-weight:700;color:var(--accent-dark)}
.ai__score-txt{display:flex;flex-direction:column;gap:2px}
.ai__score-txt strong{font-size:14.5px;font-weight:650}
.ai__score-txt small{font-size:12px;color:var(--text-3)}

.ai__products{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.prod{position:relative;border:1px solid var(--border);border-radius:var(--radius);padding:14px;background:#fff;
  display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow-sm)}
.prod--rec{border-color:var(--accent-line);box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 12%,transparent)}
.prod__tag{position:absolute;top:-9px;left:14px;font-size:10.5px;font-weight:700;letter-spacing:.02em;
  background:var(--accent);color:#fff;padding:3px 8px;border-radius:7px}
.prod__name{font-size:14px;font-weight:650;margin-top:2px}
.prod__rate{font-size:20px;font-weight:750;letter-spacing:-.02em;color:var(--accent-dark)}
.prod__meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:500}
.prod__dot{color:var(--text-3)}
.prod__note{font-size:11.8px;color:var(--text-3);line-height:1.4;margin-top:3px;text-wrap:pretty}

.msg__actions{display:flex;gap:4px;margin-top:11px}
.msg__actions button{width:28px;height:28px;border-radius:8px;border:0;background:none;color:var(--text-3);
  display:grid;place-items:center;transition:.14s}
.msg__actions button:hover{background:color-mix(in srgb,var(--text) 5%,transparent);color:var(--text)}

.typing{display:flex;gap:5px;padding:6px 2px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.4;animation:typedot 1.2s infinite}
.typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
@keyframes typedot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

.chat__composer{flex-shrink:0;border-top:1px solid var(--border);background:color-mix(in srgb,var(--surface) 70%,transparent);backdrop-filter:blur(8px)}
.chat__composer-inner{max-width:760px;margin:0 auto;padding:16px 28px 14px}
.chat__disclaimer{text-align:center;font-size:11.5px;color:var(--text-3);margin-top:10px}

/* scrollbars */
.welcome::-webkit-scrollbar,.chat__scroll::-webkit-scrollbar{width:10px}
.welcome::-webkit-scrollbar-thumb,.chat__scroll::-webkit-scrollbar-thumb{
  background:rgba(16,42,28,.14);border-radius:6px;border:3px solid transparent;background-clip:content-box}

@media (max-width:880px){
  .sb{width:74px;padding:14px 10px}
  .sb__brandtext,.sb__brandchev,.sb__search input,.sb__search kbd,.sb__label,.sb__badge,
  .sb__promo-title,.sb__promo-text,.sb__promo-btn,.sb__footitem span,.sb__userinfo,.sb__logout{display:none}
  .sb__brand,.sb__item,.sb__footitem{justify-content:center}
  .sb__search{justify-content:center;padding:0}
  .sb__promo{display:flex;justify-content:center;background:none;border:0;padding:0}
  .sb__user{justify-content:center}
  .cards--a,.cards--b,.ai__products,.ai__stats{grid-template-columns:1fr 1fr}
  .topbar__search span{display:none}
}
</style>
</head>
